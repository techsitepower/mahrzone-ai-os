<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mahrzone AI OS</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial}
body{background:#0f172a;color:white;height:100vh;overflow:hidden}
.app{height:100vh;max-width:1000px;margin:auto;padding:18px;display:flex;flex-direction:column}
.topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;gap:10px}
.title{font-size:34px;font-weight:bold}
.status{background:#16a34a;padding:10px 15px;border-radius:30px}
.chatbox{flex:1;background:#334155;border-radius:20px;padding:18px;overflow-y:auto;overflow-x:hidden}
.msg{padding:14px;border-radius:15px;margin-bottom:13px;line-height:1.6;white-space:pre-wrap}
.user{background:#2563eb;margin-left:12%}
.ai{background:#475569;margin-right:12%}
.inputbar{display:flex;gap:10px;margin-top:14px}
input{flex:1;padding:16px;border:none;border-radius:15px;font-size:16px;outline:none}
button{padding:14px 18px;border:none;border-radius:14px;color:white;cursor:pointer}
.send{background:#3b82f6}
.clear{background:#ef4444}
.copy{background:#8b5cf6}
@media(max-width:768px){.title{font-size:25px}.user,.ai{margin-left:0;margin-right:0}}
</style>
</head>

<body>

<div class="app">

<div class="topbar">
  <div class="title">🚀 Mahrzone AI OS</div>
  <div class="status">Groq Online</div>
</div>

<button class="clear" onclick="clearChat()">Clear Chat</button>

<div class="chatbox" id="chatbox"></div>

<div class="inputbar">
  <input id="msg" placeholder="Ask anything..." onkeydown="if(event.key==='Enter') askAI()">
  <button class="send" onclick="askAI()">Send</button>
  <button class="copy" onclick="copyLast()">Copy</button>
</div>

</div>

<script>
let memory = JSON.parse(localStorage.getItem("mahrzone_memory")) || [];

function saveData(){
  localStorage.setItem("mahrzone_memory", JSON.stringify(memory));
}

function render(){
  const box = document.getElementById("chatbox");
  box.innerHTML = "";

  memory.forEach(m=>{
    const div = document.createElement("div");
    div.className = "msg " + m.role;
    div.innerText = m.text;
    box.appendChild(div);
  });

  setTimeout(()=>{
    box.scrollTop = box.scrollHeight;
  },50);
}

render();

function addMessage(role,text){
  memory.push({role,text});
  saveData();
  render();
}

function clearChat(){
  memory = [];
  saveData();
  render();
}

async function askAI(){
  const input = document.getElementById("msg");
  const message = input.value.trim();

  if(!message) return;

  addMessage("user", message);
  input.value = "";

  memory.push({role:"ai", text:"Thinking..."});
  render();

  try{
    const response = await fetch("/api/chat", {
      method:"POST",
      headers:{
        "Content-Type":"application/json"
      },
      body:JSON.stringify({
        messages:[
          {
            role:"system",
            content:"You are my expert AI supervisor. Answer short, practical and direct. Before giving any command, say exactly where to run it."
          },
          ...memory
          .filter(m=>m.text !== "Thinking...")
          .slice(-10)
          .map(m=>({
            role:m.role === "user" ? "user" : "assistant",
            content:m.text
          })),
          {
            role:"user",
            content:message
          }
        ]
      })
    });

    const data = await response.json();

    memory.pop();

    let reply = "No response";

    if(data.choices && data.choices[0]){
      reply = data.choices[0].message.content;
    }

    if(data.error){
      reply = "API Error: " + data.error.message;
    }

    addMessage("ai", reply);

  }catch(err){
    memory.pop();
    addMessage("ai", "Connection error: " + err.message);
  }
}

function copyLast(){
  const last = [...memory].reverse().find(m=>m.role === "ai");

  if(last){
    navigator.clipboard.writeText(last.text);
    alert("Copied");
  }
}
</script>

</body>
</html>
