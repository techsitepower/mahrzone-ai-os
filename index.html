<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mahrzone AI OS</title>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/highlight.js/lib/common.min.js"></script>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#0f172a;
color:white;
height:100vh;
overflow:hidden;
}

.app{
height:100vh;
max-width:1000px;
margin:auto;
padding:18px;
display:flex;
flex-direction:column;
}

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:14px;
gap:10px;
flex-wrap:wrap;
}

.title{
font-size:34px;
font-weight:bold;
}

.right{
display:flex;
gap:10px;
align-items:center;
flex-wrap:wrap;
}

.status{
background:#16a34a;
padding:10px 15px;
border-radius:30px;
}

.chatbox{
flex:1;
background:#334155;
border-radius:20px;
padding:18px;
overflow-y:auto;
overflow-x:hidden;
scroll-behavior:smooth;
}

.msg{
padding:14px;
border-radius:15px;
margin-bottom:13px;
line-height:1.7;
white-space:pre-wrap;
}

.user{
background:#2563eb;
margin-left:12%;
}

.ai{
background:#475569;
margin-right:12%;
}

.inputbar{
display:flex;
gap:10px;
margin-top:14px;
}

input{
flex:1;
padding:16px;
border:none;
border-radius:15px;
font-size:16px;
outline:none;
}

button,select{
padding:14px 18px;
border:none;
border-radius:14px;
color:white;
}

button{
cursor:pointer;
}

.send{
background:#3b82f6;
}

.clear{
background:#ef4444;
}

.copy{
background:#8b5cf6;
}

select{
background:#1e293b;
}

pre{
background:#020617;
padding:14px;
border-radius:12px;
overflow:auto;
margin-top:10px;
}

code{
font-family:monospace;
}

.ai p,.ai ul,.ai h1,.ai h2,.ai h3{
margin-bottom:10px;
}

.ai ul{
padding-left:20px;
}

@media(max-width:768px){

.title{
font-size:25px;
}

.user,.ai{
margin-left:0;
margin-right:0;
}

}
</style>
</head>

<body>

<div class="app">

<div class="topbar">

<div class="title">
🚀 Mahrzone AI OS
</div>

<div class="right">

<select id="provider" onchange="updateModels()">

<option value="groq">
Groq
</option>

<option value="openrouter">
OpenRouter
</option>

</select>

<select id="model"></select>

<div class="status">
AI Online
</div>

</div>

</div>

<button class="clear" onclick="clearChat()">
Clear Chat
</button>

<div class="chatbox" id="chatbox"></div>

<div class="inputbar">

<input
id="msg"
placeholder="Ask anything..."
onkeydown="if(event.key==='Enter') askAI()"
>

<button class="send" onclick="askAI()">
Send
</button>

<button class="copy" onclick="copyLast()">
Copy
</button>

</div>

</div>

<script>

const MODELS = {

groq:[

{
name:"Llama 3.3 70B",
value:"llama-3.3-70b-versatile"
},

{
name:"Llama 3.1 8B Instant",
value:"llama-3.1-8b-instant"
}

],

openrouter:[

{
name:"GPT OSS 20B",
value:"openai/gpt-oss-20b:free"
}

]

};

function updateModels(){

const provider =
document.getElementById("provider").value;

const modelSelect =
document.getElementById("model");

modelSelect.innerHTML = "";

MODELS[provider]
.forEach(model=>{

const option =
document.createElement("option");

option.value =
model.value;

option.textContent =
model.name;

modelSelect.appendChild(option);

});

}

updateModels();

let memory =
JSON.parse(localStorage.getItem("mahrzone_memory")) || [];

function saveData(){

localStorage.setItem(
"mahrzone_memory",
JSON.stringify(memory)
);

}

function render(){

const box =
document.getElementById("chatbox");

box.innerHTML = "";

memory.forEach(m=>{

const div =
document.createElement("div");

div.className =
"msg " + m.role;

if(m.role === "ai"){

div.innerHTML =
marked.parse(m.text);

div.querySelectorAll('pre code')
.forEach((el)=>{
hljs.highlightElement(el);
});

}else{

div.innerText = m.text;

}

box.appendChild(div);

});

setTimeout(()=>{
box.scrollTop =
box.scrollHeight;
},50);

}

render();

function addMessage(role,text){

memory.push({
role,
text
});

saveData();

render();

}

function clearChat(){

memory = [];

saveData();

render();

}

async function askAI(){

const input =
document.getElementById("msg");

const message =
input.value.trim();

if(!message) return;

const model =
document.getElementById("model").value;

const provider =
document.getElementById("provider").value;

addMessage("user", message);

input.value = "";

memory.push({
role:"ai",
text:"Thinking..."
});

render();

try{

const response =
await fetch("/api/chat", {

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

provider:provider,

model:model,

messages:[

{
role:"system",
content:`You are Mahrzone AI OS.

Rules:
- Be concise and practical.
- Natural greetings.
- Mention terminal/file location only for technical commands.
- Avoid unnecessary theory.`
},

...memory
.filter(m=>m.text !== "Thinking...")
.slice(-10)
.map(m=>({
role:m.role === "user"
? "user"
: "assistant",
content:m.text
})),

{
role:"user",
content:message
}

]

})

});

const data =
await response.json();

memory.pop();

let reply =
"No response";

if(
data.choices &&
data.choices[0]
){

reply =
data.choices[0]
.message
.content;

}

if(data.error){

reply =
"API Error: " +
data.error.message;

}

addMessage("ai", reply);

}catch(err){

memory.pop();

addMessage(
"ai",
"Connection error: " +
err.message
);

}

}

function copyLast(){

const last =
[...memory]
.reverse()
.find(m=>m.role === "ai");

if(last){

navigator.clipboard.writeText(
last.text
);

alert("Copied");

}

}

</script>

</body>
</html>
