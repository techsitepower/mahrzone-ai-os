<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Mahrzone AI OS</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}
body{height:100vh;background:#0f172a;color:#fff;overflow:hidden}
.app{height:100vh;width:100%;display:flex;justify-content:center;align-items:center;padding:16px}
.panel{width:100%;max-width:980px;height:92vh;background:#1e293b;border-radius:22px;padding:18px;display:flex;flex-direction:column;box-shadow:0 0 35px rgba(0,0,0,.45)}
.top{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:14px;flex-wrap:wrap}
h1{font-size:28px}.controls{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
select,button,input{border:0;border-radius:13px;font-size:15px}select{padding:12px;background:#334155;color:#fff}button{padding:12px 16px;background:#3b82f6;color:#fff;cursor:pointer}.green{background:#22c55e}.red{background:#ef4444}.purple{background:#8b5cf6}.status{background:#16a34a;padding:9px 14px;border-radius:999px;font-size:13px}
.chatbox{flex:1;background:#334155;border-radius:18px;padding:16px;overflow-y:auto;overflow-x:hidden;scroll-behavior:smooth;min-height:0}
.msg{padding:13px 14px;border-radius:14px;margin-bottom:12px;line-height:1.55;white-space:pre-wrap;word-wrap:break-word;max-width:86%}.user{background:#2563eb;margin-left:auto}.ai{background:#475569;margin-right:auto}.typing{opacity:.8;font-style:italic}
.inputbar{display:flex;gap:10px;margin-top:14px}input{flex:1;padding:15px;outline:0}.footer-actions{display:flex;gap:10px}
@media(max-width:700px){.panel{height:95vh;padding:12px}h1{font-size:22px}.msg{max-width:100%}.inputbar{flex-direction:column}.footer-actions{display:flex}.footer-actions button{flex:1}}
</style>
</head>
<body>
<div class="app"><div class="panel">
  <div class="top">
    <h1>🚀 Ultimate AI OS</h1>
    <div class="controls">
      <select id="mode">
        <option value="advisor">Advisor</option>
        <option value="coding">Coding</option>
        <option value="seo">SEO</option>
        <option value="kali">Kali Lab</option>
      </select>
      <select id="model">
        <option value="openai/gpt-oss-20b:free">GPT OSS 20B</option>
        <option value="meta-llama/llama-3.3-70b-instruct:free">Llama 3.3 70B</option>
        <option value="google/gemma-2-9b-it:free">Gemma 2</option>
        <option value="mistralai/mistral-7b-instruct:free">Mistral 7B</option>
      </select>
      <span class="status">Online</span>
    </div>
  </div>
  <div id="chatbox" class="chatbox"></div>
  <div class="inputbar">
    <input id="msg" placeholder="Ask anything..." />
    <div class="footer-actions">
      <button onclick="askAI()">Send</button>
      <button class="green" onclick="voiceInput()">🎤</button>
      <button class="purple" onclick="copyLast()">Copy</button>
      <button class="red" onclick="clearChat()">Clear</button>
    </div>
  </div>
</div></div>
<script>
const chatbox = document.getElementById("chatbox");
const input = document.getElementById("msg");
const modelSelect = document.getElementById("model");
const modeSelect = document.getElementById("mode");
let memory = JSON.parse(localStorage.getItem("mahrzone_memory_v2")) || [];
const prompts = {
  advisor: "You are my elite personal AI supervisor. Answer short, practical and direct.",
  coding: "You are my coding assistant. Give exact file location, exact code and no extra theory.",
  seo: "You are my SEO and CPA growth strategist. Focus on traffic, ranking and monetization.",
  kali: "You are my safe Kali Linux lab assistant. Only guide legal defensive learning and troubleshooting."
};
const userProfile = "Before any command, say exactly where to run it. Focus on AI tools, API, Cloudflare, SEO, CPA, hosting, automation, Windows and Kali Linux. Avoid long theory.";
function save(){localStorage.setItem("mahrzone_memory_v2", JSON.stringify(memory));}
function scrollBottom(){setTimeout(()=>{chatbox.scrollTop = chatbox.scrollHeight;},30);}
function render(){
  chatbox.innerHTML = "";
  memory.forEach(item=>{
    const div = document.createElement("div");
    div.className = "msg " + item.role;
    div.textContent = item.text;
    chatbox.appendChild(div);
  });
  scrollBottom();
}
function addMessage(role,text){memory.push({role,text});save();render();}
function clearChat(){memory=[];save();render();}
async function askAI(){
  const message = input.value.trim();
  if(!message) return;
  addMessage("user", message);
  input.value = "";
  addMessage("ai", "Thinking...");
  try{
    const cleanMemory = memory.filter(m=>m.text !== "Thinking...").slice(-12).map(m=>({role:m.role === "user" ? "user" : "assistant", content:m.text}));
    const response = await fetch("/api/chat",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        model:modelSelect.value,
        messages:[
          {role:"system", content:prompts[modeSelect.value] + " " + userProfile},
          ...cleanMemory,
          {role:"user", content:message}
        ]
      })
    });
    const data = await response.json();
    memory.pop();
    let reply = "No response";
    if(data.choices && data.choices[0] && data.choices[0].message){reply = data.choices[0].message.content;}
    if(data.error){reply = "API Error: " + (data.error.message || JSON.stringify(data.error));}
    addMessage("ai", reply);
  }catch(err){
    memory.pop();
    addMessage("ai", "Connection error: " + err.message);
  }
}
function copyLast(){
  const last = [...memory].reverse().find(m=>m.role === "ai");
  if(last){navigator.clipboard.writeText(last.text);alert("Copied");}
}
function voiceInput(){
  const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
  if(!Speech){alert("Voice not supported");return;}
  const recognition = new Speech();
  recognition.lang = "en-US";
  recognition.start();
  recognition.onresult = e=>{input.value = e.results[0][0].transcript;};
}
input.addEventListener("keydown", e=>{if(e.key === "Enter") askAI();});
render();
</script>
</body>
</html>
