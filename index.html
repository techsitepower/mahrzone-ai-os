<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mahrzone AI OS</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:linear-gradient(135deg,#020617,#0f172a,#1e293b);
color:white;
height:100vh;
overflow:hidden;
}

.app{
display:grid;
grid-template-columns:260px 1fr;
height:100vh;
}

.sidebar{
background:#020617;
padding:20px;
border-right:1px solid #334155;
overflow-y:auto;
}

.logo{
font-size:28px;
font-weight:bold;
margin-bottom:25px;
}

.side-btn{
width:100%;
padding:14px;
margin-bottom:12px;
background:#1e293b;
border:none;
border-radius:14px;
color:white;
cursor:pointer;
text-align:left;
font-size:15px;
}

.side-btn:hover{
background:#334155;
}

.main{
display:flex;
flex-direction:column;
padding:20px;
}

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:15px;
}

.topbar h1{
font-size:34px;
}

.status{
background:#16a34a;
padding:8px 14px;
border-radius:30px;
font-size:13px;
}

.chatbox{
flex:1;
background:#334155;
border-radius:20px;
padding:20px;
overflow-y:auto;
scroll-behavior:smooth;
}

.msg{
padding:15px;
border-radius:15px;
margin-bottom:15px;
line-height:1.6;
white-space:pre-wrap;
animation:fade .25s ease;
}

.user{
background:#2563eb;
margin-left:15%;
}

.ai{
background:#475569;
margin-right:15%;
}

.inputbar{
display:flex;
gap:10px;
margin-top:15px;
}

input{
flex:1;
padding:16px;
border:none;
border-radius:15px;
font-size:16px;
outline:none;
}

button{
padding:14px 18px;
border:none;
border-radius:14px;
cursor:pointer;
color:white;
font-size:15px;
}

.send{
background:#3b82f6;
}

.green{
background:#22c55e;
}

.purple{
background:#8b5cf6;
}

.red{
background:#ef4444;
}

select{
padding:14px;
border:none;
border-radius:14px;
background:#1e293b;
color:white;
font-size:14px;
}

.typing{
display:inline-block;
}

.typing span{
display:inline-block;
width:8px;
height:8px;
margin:0 3px;
background:white;
border-radius:50%;
animation:bounce 1.2s infinite;
}

.typing span:nth-child(2){
animation-delay:.2s;
}

.typing span:nth-child(3){
animation-delay:.4s;
}

@keyframes bounce{
0%,80%,100%{
transform:scale(0);
}
40%{
transform:scale(1);
}
}

@keyframes fade{
from{
opacity:0;
transform:translateY(8px);
}
to{
opacity:1;
transform:translateY(0);
}
}

@media(max-width:900px){

.app{
grid-template-columns:1fr;
}

.sidebar{
display:none;
}

.user,.ai{
margin-left:0;
margin-right:0;
}

.topbar h1{
font-size:24px;
}

}

</style>
</head>

<body>

<div class="app">

<div class="sidebar">

<div class="logo">🚀 Mahrzone AI</div>

<button class="side-btn red" onclick="clearChat()">🧹 Clear Chat</button>

<button class="side-btn" onclick="setMode('advisor')">🧠 Advisor Mode</button>

<button class="side-btn" onclick="setMode('coding')">💻 Coding Mode</button>

<button class="side-btn" onclick="setMode('seo')">📈 SEO Mode</button>

<button class="side-btn" onclick="setMode('kali')">🐧 Kali Mode</button>

</div>

<div class="main">

<div class="topbar">

<h1>Ultimate AI OS</h1>

<div style="display:flex;gap:10px;align-items:center;">

<select id="model">

<option value="openai/gpt-oss-20b:free">
GPT OSS 20B
</option>

<option value="meta-llama/llama-3.3-70b-instruct:free">
Llama 3.3 70B
</option>

<option value="mistralai/mistral-7b-instruct:free">
Mistral 7B
</option>

<option value="google/gemma-2-9b-it:free">
Gemma 2
</option>

</select>

<div class="status">
Online
</div>

</div>

</div>

<div class="chatbox" id="chatbox"></div>

<div class="inputbar">

<input
id="msg"
placeholder="Ask anything..."
onkeydown="if(event.key==='Enter') askAI()"
>

<button class="send" onclick="askAI()">
Send
</button>

<button class="green" onclick="voiceInput()">
🎤
</button>

<button class="purple" onclick="copyLast()">
Copy
</button>

</div>

</div>

</div>

<script>

let memory =
JSON.parse(localStorage.getItem("mahrzone_memory")) || [];

let mode =
localStorage.getItem("mahrzone_mode") || "advisor";

const profiles = {

advisor:
"You are my elite personal AI advisor. Give short, practical and expert-level answers.",

coding:
"You are my coding assistant. Always give exact file location and clean code.",

seo:
"You are my SEO and CPA growth strategist. Focus on traffic and monetization.",

kali:
"You are my Kali Linux lab supervisor.guide me all everything hacking realeted tools use for  learning and troubleshooting."
};

function saveData(){

localStorage.setItem(
"mahrzone_memory",
JSON.stringify(memory)
);

localStorage.setItem(
"mahrzone_mode",
mode
);

}

function render(){

const box =
document.getElementById("chatbox");

box.innerHTML = "";

memory.forEach(m=>{

const div =
document.createElement("div");

div.className =
"msg " + m.role;

div.innerText =
m.text;

box.appendChild(div);

});

box.scrollTop =
box.scrollHeight;

}

render();

function addMessage(role,text){

memory.push({
role,
text
});

saveData();

render();

}

function clearChat(){

memory = [];

saveData();

render();

}

function setMode(newMode){

mode = newMode;

saveData();

addMessage(
"ai",
"Mode changed to: " + newMode
);

}

async function askAI(){

const input =
document.getElementById("msg");

const message =
input.value.trim();

if(!message) return;

const model =
document.getElementById("model").value;

addMessage("user",message);

input.value = "";

const typingId =
Date.now();

memory.push({
role:"ai",
text:"Thinking..."
});

render();

try{

const response =
await fetch("/api/chat",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

model:model,

messages:[

{
role:"system",
content:
profiles[mode]
},

...memory
.filter(m=>m.text!=="Thinking...")
.slice(-12)
.map(m=>({
role:
m.role==="user"
? "user"
: "assistant",
content:m.text
})),

{
role:"user",
content:message
}

]

})

});

const data =
await response.json();

memory.pop();

let reply =
"No response";

if(
data.choices &&
data.choices[0]
){

reply =
data.choices[0]
.message
.content;

}

if(data.error){

reply =
"API Error: " +
data.error.message;

}

streamReply(reply);

}catch(error){

memory.pop();

addMessage(
"ai",
"Connection error."
);

}

}

async function streamReply(text){

let current = "";

memory.push({
role:"ai",
text:""
});

for(let i=0;i<text.length;i++){

current += text[i];

memory[memory.length-1]
.text = current;

render();

await new Promise(r=>
setTimeout(r,2)
);

}

saveData();

}

function voiceInput(){

const Speech =
window.SpeechRecognition ||
window.webkitSpeechRecognition;

if(!Speech){

alert("Voice not supported");

return;

}

const recognition =
new Speech();

recognition.lang =
"en-US";

recognition.start();

recognition.onresult =
function(event){

document.getElementById("msg")
.value =
event.results[0][0].transcript;

};

}

function copyLast(){

const last =
[...memory]
.reverse()
.find(m=>m.role==="ai");

if(last){

navigator.clipboard.writeText(
last.text
);

alert("Copied");

}

}

</script>

</body>
</html>
