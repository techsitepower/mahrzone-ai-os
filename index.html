<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ultimate AI OS</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial}
body{background:#0f172a;color:white;height:100vh;display:flex;justify-content:center;align-items:center}
.container{width:95%;max-width:900px;background:#1e293b;padding:20px;border-radius:20px}
h1{text-align:center;margin-bottom:20px}
.chatbox{height:430px;background:#334155;padding:15px;border-radius:15px;overflow-y:auto;margin-bottom:15px}
.msg{padding:12px;border-radius:12px;margin-bottom:10px;white-space:pre-wrap}
.user{background:#2563eb}
.ai{background:#475569}
.bottom{display:flex;gap:10px}
input{flex:1;padding:14px;border:none;border-radius:10px;font-size:16px}
button{padding:14px 20px;border:none;border-radius:10px;background:#3b82f6;color:white;cursor:pointer}
.clear{background:#ef4444;margin-bottom:10px}
</style>
</head>

<body>

<div class="container">
<h1>🚀 Ultimate AI OS</h1>

<button class="clear" onclick="clearChat()">Clear Chat</button>

<div class="chatbox" id="chatbox"></div>

<div class="bottom">
<input id="msg" placeholder="Ask anything...">
<button onclick="askAI()">Send</button>
</div>
</div>

<script>
let memory = JSON.parse(localStorage.getItem("ai_memory")) || [];

const profile = `
User wants short, practical answers.
Before every command, mention exactly where to run it.
Focus: AI, API, SEO, CPA, Cloudflare, Kali Linux, hosting, automation.
Avoid unnecessary theory.
`;

function save(){
localStorage.setItem("ai_memory", JSON.stringify(memory));
}

function render(){
const box = document.getElementById("chatbox");
box.innerHTML = "";
memory.forEach(m=>{
const div = document.createElement("div");
div.className = "msg " + m.role;
div.innerText = m.text;
box.appendChild(div);
});
box.scrollTop = box.scrollHeight;
}

render();

function addMessage(role,text){
memory.push({role,text});
save();
render();
}

async function askAI(){
const input = document.getElementById("msg");
const message = input.value.trim();

if(!message) return;

addMessage("user", message);
input.value = "";

addMessage("ai", "Thinking...");

const response = await fetch("/api/chat", {
method: "POST",
headers: {
"Content-Type": "application/json"
},
body: JSON.stringify({
messages: [
{
role: "system",
content: `You are an elite personal AI supervisor. Answer short, practical, direct, and expert-level. ${profile}`
},
...memory
.filter(m => m.text !== "Thinking...")
.map(m => ({
role: m.role === "user" ? "user" : "assistant",
content: m.text
})),
{
role: "user",
content: message
}
]
})
});

const data = await response.json();

memory.pop();

let reply = "No response";

if(data.choices && data.choices[0]){
reply = data.choices[0].message.content;
}

if(data.error){
reply = "API Error: " + data.error.message;
}

addMessage("ai", reply);
}

function clearChat(){
memory = [];
save();
render();
}
</script>

</body>
</html>
